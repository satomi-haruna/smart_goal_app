<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF=8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>賢い目標設定アプリ SMART</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <h1>賢い目標設定アプリ SMART</h1>

    <div class="inputCard">
      <input type="text" placeholder="目標を入力してください" />
      <button>追加</button>
    </div>

    <div class="goalList">
      <!--ここに目標カードが入る-->
      <div class="goalCard">
        <input type="checkbox" />
        <span class="goalTitle">サンプル目標</span>
        <button class="deleteBtn">×</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
